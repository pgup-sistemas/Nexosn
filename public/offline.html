<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sem conexão · NEXOSN</title>
<style>
@font-face { font-family: 'Inter'; font-weight: 400; font-display: swap; src: url('/fonts/inter-400.woff2') format('woff2'); }
@font-face { font-family: 'Inter'; font-weight: 600; font-display: swap; src: url('/fonts/inter-600.woff2') format('woff2'); }
@font-face { font-family: 'Inter'; font-weight: 700; font-display: swap; src: url('/fonts/inter-700.woff2') format('woff2'); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #EBEBEA;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
}
.card {
    background: #fff; border-radius: 20px;
    padding: 40px 32px; max-width: 360px; width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}
.icon-wrap {
    width: 64px; height: 64px; border-radius: 16px;
    background: #003049; display: flex; align-items: center;
    justify-content: center; margin: 0 auto 24px;
}
h1 { font-size: 20px; font-weight: 700; color: #1a1f2e; margin-bottom: 10px; }
p  { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
.tip {
    background: #f4f5f7; border-radius: 10px; padding: 14px 16px;
    font-size: 12px; color: #6b7280; text-align: left;
    line-height: 1.7; margin-bottom: 24px;
}
.tip strong { color: #1a1f2e; display: block; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
.btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 13px 20px; border-radius: 12px;
    background: #003049; color: #fff;
    font-size: 14px; font-weight: 600; border: none; cursor: pointer;
    text-decoration: none; transition: opacity .15s;
}
.btn:hover { opacity: .88; }
.brand { margin-top: 28px; font-size: 11px; color: #aaa; letter-spacing: .06em; }
.brand strong { color: #52514E; font-weight: 700; letter-spacing: .1em; }
</style>
</head>
<body>
<div class="card">
    <!-- N-monogram NEXOSN -->
    <div class="icon-wrap">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" style="color:#FCBF49;">
            <line x1="5" y1="5"  x2="5"  y2="19" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"/>
            <line x1="5" y1="5"  x2="19" y2="19" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"/>
            <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"/>
            <circle cx="5"  cy="5"  r="2.5" fill="currentColor"/>
            <circle cx="5"  cy="19" r="2.5" fill="currentColor"/>
            <circle cx="19" cy="5"  r="2.5" fill="currentColor"/>
            <circle cx="19" cy="19" r="2.5" fill="currentColor"/>
        </svg>
    </div>

    <h1>Você está sem internet</h1>
    <p>Não foi possível carregar esta página. Verifique sua conexão e tente novamente.</p>

    <div class="tip">
        <strong>💡 Dica</strong>
        Se você já visitou este perfil antes, ele pode estar disponível no cache do seu celular — tente reconectar e recarregar.
    </div>

    <button class="btn" onclick="window.location.reload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M8 16H3v5"/>
        </svg>
        Tentar novamente
    </button>

    <div class="brand">Identidade digital por <strong>NEXOSN</strong></div>
</div>
</body>
</html>
